<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MarketPulse Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container py-5">
    <h1 class="mb-4 text-center text-primary">📊 MarketPulse Dashboard</h1>

    <!-- 🔹 Summary Cards -->
    <div class="row g-4 mb-5">
      <!-- Active Symbols -->
      <div class="col-md-4">
        <div class="card text-white card-gradient-blue">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <div class="fs-1">🧮</div>
              <h6 class="card-title mt-2">Active Symbols</h6>
              <p class="card-text fs-3 fw-bold">4</p>
            </div>
            <i class="bi bi-bar-chart-line-fill fs-1 opacity-25"></i>
          </div>
        </div>
      </div>

      <!-- Total Alerts -->
      <div class="col-md-4">
        <div class="card text-white card-gradient-red">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <div class="fs-1">🚨</div>
              <h6 class="card-title mt-2">Total Alerts</h6>
              <p class="card-text fs-3 fw-bold">43</p>
            </div>
            <i class="bi bi-exclamation-triangle-fill fs-1 opacity-25"></i>
          </div>
        </div>
      </div>

      <!-- Open Trades -->
      <div class="col-md-4">
        <div class="card text-white card-gradient-green">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <div class="fs-1">📂</div>
              <h6 class="card-title mt-2">Open Trades</h6>
              <p class="card-text fs-3 fw-bold">0</p>
            </div>
            <i class="bi bi-folder-fill fs-1 opacity-25"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- 📉 Chart Section -->
    <div class="card shadow-sm chart-container">
      <div class="card-header bg-white fw-bold">📉 Price Trend Chart</div>
      <div class="card-body">
        <canvas id="priceChart" height="150"></canvas>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const ctx = document.getElementById("priceChart").getContext("2d");
    const priceChart = new Chart(ctx, {
      type: "line",
      data: {
        labels: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"],
        datasets: [{
          label: "BTC/USD",
          data: [30120, 31200, 31080, 32900, 34000, 33800, 34750],
          borderColor: "#38ef7d",
          backgroundColor: "rgba(56, 239, 125, 0.2)",
          fill: true,
          tension: 0.4,
          pointRadius: 3
        }]
      },
      options: {
        responsive: true,
        scales: {
          x: { grid: { display: false }, ticks: { color: "#888" } },
          y: { ticks: { color: "#888" } }
        },
        plugins: {
          legend: { labels: { color: "#444" } }
        }
      }
    });
  </script>
</body>
</html>
