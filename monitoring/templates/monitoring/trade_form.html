{% extends "monitoring/base.html" %}
{% load crispy_forms_tags %}
{% block title %}Trade Form{% endblock %}
{% block content %}
<h2 class="mb-4">{% if form.instance.pk %}Edit Trade{% else %}New Trade{% endif %}</h2>
<form method="post">
  {% csrf_token %}
  {{ form|crispy }}
  <button type="submit" class="btn btn-success">Save</button>
</form>
{% endblock %}
