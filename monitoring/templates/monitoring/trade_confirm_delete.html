{% extends "monitoring/base.html" %}
{% block title %}Delete Trade{% endblock %}
{% block content %}
<h2>Delete Trade</h2>
<p>Are you sure you want to delete this trade?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Yes, delete</button>
  <a href="{% url 'trading:trade_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
